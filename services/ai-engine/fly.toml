# Fly.io deployment config — GitScope Neural AI Engine
# Deploy: fly deploy (from services/ai-engine/)

app = "gitscope-engine"
primary_region = "sin"   # Singapore — closest to India, free tier available

[build]
  dockerfile = "Dockerfile"

[env]
  PORT         = "8765"
  LOG_LEVEL    = "info"
  WORKERS      = "1"

# Persistent volume — ChromaDB knowledge base survives restarts and deploys
[[mounts]]
  source      = "gitscope_data"
  destination = "/app/data"

[http_service]
  internal_port        = 8765
  force_https          = true
  auto_stop_machines   = false   # Never sleep — stays warm for instant responses
  auto_start_machines  = true
  min_machines_running = 1

  [http_service.concurrency]
    type       = "requests"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
